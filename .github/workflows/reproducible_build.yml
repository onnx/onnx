# Verifies that two successive builds from identical source produce bit-for-bit
# identical wheels (reproducible builds).  Calls the same release_linux.yml
# callable workflow twice with a minimal matrix, then compares wheel checksums.
# On mismatch, diffoscope pinpoints exactly which files or metadata differ.

name: ReproducibleBuild

on:
  pull_request:
    types: [labeled, opened, synchronize, reopened]
  schedule:
    - cron: '0 6 * * 1'  # every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build1:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run release CIs')
    uses: ./.github/workflows/release_linux.yml
    with:
      os: linux
      build_mode: release
      python_versions: '["3.12"]'
      architectures: '["x64"]'
      run_tests: false
      artifact_name_prefix: repro-build1-wheels

  build2:
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run release CIs')
    uses: ./.github/workflows/release_linux.yml
    with:
      os: linux
      build_mode: release
      python_versions: '["3.12"]'
      architectures: '["x64"]'
      run_tests: false
      artifact_name_prefix: repro-build2-wheels

  compare:
    needs: [build1, build2]
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: repro-build1-wheels-linux-x64-3.12-abi3
          path: /tmp/build1

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: repro-build2-wheels-linux-x64-3.12-abi3
          path: /tmp/build2

      - name: Compare checksums
        run: |
          wheel1=$(ls /tmp/build1/*.whl | head -1)
          wheel2=$(ls /tmp/build2/*.whl | head -1)

          h1=$(sha256sum "$wheel1" | cut -d' ' -f1)
          h2=$(sha256sum "$wheel2" | cut -d' ' -f1)

          echo "Build 1: $(basename "$wheel1")  →  $h1"
          echo "Build 2: $(basename "$wheel2")  →  $h2"

          if [ "$h1" = "$h2" ]; then
            echo "Reproducible build confirmed — both wheels have SHA-256 $h1"
          else
            echo "Non-reproducible build — SHA-256 mismatch"
            exit 1
          fi

      - name: Install diffoscope
        if: failure()
        run: sudo apt-get install -y --no-install-recommends diffoscope

      - name: Run diffoscope
        if: failure()
        run: |
          wheel1=$(ls /tmp/build1/*.whl | head -1)
          wheel2=$(ls /tmp/build2/*.whl | head -1)
          diffoscope "$wheel1" "$wheel2" \
            --text /tmp/diffoscope.txt \
            --html /tmp/diffoscope.html \
            --max-text-report-size 10000000 \
            || true
          echo "--- diffoscope summary (first 100 lines) ---"
          head -100 /tmp/diffoscope.txt || true

      - name: Upload diffoscope report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: diffoscope-report
          path: |
            /tmp/diffoscope.html
            /tmp/diffoscope.txt
          retention-days: 30
