name: PyodideRelease

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      build_mode:
        required: true
        type: string

jobs:
  build:

    permissions:
      contents: read

    if: github.event_name != 'pull_request' || startsWith(github.base_ref, 'rel-') || contains(github.event.pull_request.labels.*.name, 'run release CIs')
    runs-on: ubuntu-24.04
    env:
      BUILD_MODE: ${{ inputs.build_mode || github.event.inputs.build_mode || 'preview' }}
      OS_NAME: ${{ inputs.os || 'pyodide' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: true

      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements-release_build.txt
          python -m pip install -q pyodide-build==0.34.2

      - name: Get Pyodide config
        id: pyodide-config
        run: |
          pyodide config get emscripten_version | sed 's/^/emscripten_version=/' >> "$GITHUB_OUTPUT"
          pyodide config get emsdk_dir | sed 's/^/emsdk_dir=/' >> "$GITHUB_OUTPUT"

      - name: Cache emsdk
        id: cache-emsdk
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pyodide-config.outputs.emsdk_dir }}
          key: emsdk-${{ steps.pyodide-config.outputs.emscripten_version }}

      - name: Install emscripten
        if: steps.cache-emsdk.outputs.cache-hit != 'true'
        run: |
          pyodide xbuildenv install-emscripten

      - name: Export emscripten environment
        env:
          EMSDK_DIR: ${{ steps.pyodide-config.outputs.emsdk_dir }}
        run: |
          echo "EMSDK=$EMSDK_DIR" >> "$GITHUB_ENV"
          echo "$EMSDK_DIR" >> "$GITHUB_PATH"
          echo "$EMSDK_DIR/upstream/emscripten" >> "$GITHUB_PATH"

      - name: Determine protobuf version
        id: protobuf-version
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from pathlib import Path
          import re

          requirements = Path("requirements-release_build.txt").read_text(encoding="utf-8")
          match = re.search(r"^protobuf==([0-9.]+)", requirements, re.MULTILINE)
          if not match:
              pyproject = Path("pyproject.toml").read_text(encoding="utf-8")
              match = re.search(r'protobuf>=([0-9.]+)', pyproject)
          if not match:
              raise SystemExit("Unable to determine protobuf version")
          print(f"version={match.group(1)}")
          PY

      - name: Cache protobuf-wasm
        id: cache-protobuf-wasm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: protobuf-wasm
          key: protobuf-wasm-${{ steps.pyodide-config.outputs.emscripten_version }}-${{ steps.protobuf-version.outputs.version }}

      - name: Build protobuf for wasm
        if: steps.cache-protobuf-wasm.outputs.cache-hit != 'true'
        env:
          PROTOBUF_VERSION: ${{ steps.protobuf-version.outputs.version }}
        run: |
          source "$EMSDK/emsdk_env.sh" > /dev/null
          git clone --depth 1 --branch "v$PROTOBUF_VERSION" https://github.com/protocolbuffers/protobuf.git protobuf-wasm
          git -C protobuf-wasm submodule update --init --recursive
          emcmake cmake -S protobuf-wasm -B protobuf-wasm/build_source \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/protobuf-wasm/install \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DABSL_ENABLE_INSTALL=ON \
            -Dprotobuf_ABSL_PROVIDER=module \
            -Dprotobuf_BUILD_PROTOC_BINARIES=OFF \
            -Dprotobuf_BUILD_SHARED_LIBS=OFF \
            -Dprotobuf_BUILD_TESTS=OFF \
            -Dprotobuf_WITH_ZLIB=OFF
          cmake --build protobuf-wasm/build_source --parallel "$(nproc)"
          cmake --install protobuf-wasm/build_source

      - name: Build host protoc
        run: |
          source workflow_scripts/protobuf/build_protobuf_unix.sh "$(nproc)" "$PWD/protobuf-host"
          echo "$PWD/protobuf-host/bin" >> "$GITHUB_PATH"

      - name: Configure preview build
        if: ${{ env.BUILD_MODE != 'release' }}
        run: |
          sed -i 's/name = "onnx"/name = "onnx-weekly"/' pyproject.toml
          echo "ONNX_PREVIEW_BUILD=1" >> "$GITHUB_ENV"

      - name: Build Pyodide wheel
        env:
          ONNX_ML: 1
          CXXFLAGS: >-
            -I${{ github.workspace }}/protobuf-wasm/third_party/abseil-cpp
            -I${{ github.workspace }}/protobuf-wasm/third_party/utf8_range
          CMAKE_ARGS: >-
            -DONNX_PYODIDE_BUILD=ON
            -DONNX_USE_PROTOBUF_SHARED_LIBS=OFF
            -DONNX_USE_LITE_PROTO=ON
            -DONNX_PROTOC_EXECUTABLE=${{ github.workspace }}/protobuf-host/bin/protoc
            -DProtobuf_PROTOC_EXECUTABLE=${{ github.workspace }}/protobuf-host/bin/protoc
            -DProtobuf_INCLUDE_DIR=${{ github.workspace }}/protobuf-wasm/src
            -DProtobuf_LITE_LIBRARY=${{ github.workspace }}/protobuf-wasm/install/lib/libprotobuf-lite.a
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/protobuf-wasm/install
        run: |
          source "$EMSDK/emsdk_env.sh" > /dev/null
          pyodide build

      - name: Remove test data from wheel
        run: |
          python - <<'PY'
          import base64
          import csv
          import hashlib
          import os
          from pathlib import Path
          import shutil
          import tempfile
          import zipfile

          wheels = sorted(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, found {len(wheels)}")

          wheel_path = wheels[0]

          with tempfile.TemporaryDirectory() as td:
              root = Path(td) / "wheel"
              with zipfile.ZipFile(wheel_path) as archive:
                  archive.extractall(root)

              test_data_root = root / "onnx" / "backend" / "test" / "data"
              if test_data_root.exists():
                  shutil.rmtree(test_data_root)

              dist_info_dirs = list(root.glob("*.dist-info"))
              if len(dist_info_dirs) != 1:
                  raise SystemExit(
                      f"Expected exactly one .dist-info directory, found {len(dist_info_dirs)}"
                  )

              dist_info_dir = dist_info_dirs[0]
              record_path = dist_info_dir / "RECORD"

              rows = []
              for path in sorted(p for p in root.rglob("*") if p.is_file() and p != record_path):
                  relpath = path.relative_to(root).as_posix()
                  data = path.read_bytes()
                  digest = hashlib.sha256(data).digest()
                  encoded_digest = base64.urlsafe_b64encode(digest).rstrip(b"=").decode("ascii")
                  rows.append((relpath, f"sha256={encoded_digest}", str(len(data))))

              rows.append((record_path.relative_to(root).as_posix(), "", ""))
              with record_path.open("w", encoding="utf-8", newline="") as record_file:
                  writer = csv.writer(record_file, lineterminator="\n")
                  writer.writerows(rows)

              with zipfile.ZipFile(wheel_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
                  for path in sorted(p for p in root.rglob("*") if p.is_file()):
                      archive.write(path, path.relative_to(root).as_posix())
          PY
      - name: Validate wheel contents
        env:
          BUILD_MODE: ${{ env.BUILD_MODE }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import zipfile

          wheels = sorted(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, found {len(wheels)}")

          wheel = wheels[0]
          with zipfile.ZipFile(wheel) as archive:
              bad_file = archive.testzip()
              if bad_file is not None:
                  raise SystemExit(f"Corrupt wheel member: {bad_file}")
              names = archive.namelist()
              if any(name.startswith("onnx/backend/test/data/") for name in names):
                  raise SystemExit("Wheel still contains backend test data")
              metadata_name = next(name for name in names if name.endswith(".dist-info/METADATA"))
              metadata = archive.read(metadata_name).decode("utf-8")
              if "Name: onnx-weekly" in metadata:
                  found_name = "onnx-weekly"
              elif "Name: onnx" in metadata:
                  found_name = "onnx"
              else:
                  raise SystemExit("Wheel metadata does not contain package name")

          build_mode = os.environ["BUILD_MODE"]
          expected_name = "onnx" if build_mode == "release" else "onnx-weekly"
          if found_name != expected_name:
              raise SystemExit(f"Expected package name {expected_name}, found {found_name}")
          PY

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ env.OS_NAME }}
          path: dist/*.whl

  test:
    needs: build
    runs-on: ubuntu-24.04

    permissions:
          contents: read

    env:
      OS_NAME: ${{ inputs.os || 'pyodide' }}

    steps:
      - name: Set up Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wheels-${{ env.OS_NAME }}
          path: dist

      - name: Install pyodide-build
        run: python -m pip install -q pyodide-build==0.34.2

      - name: Validate downloaded wheel
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          wheels = sorted(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"Expected exactly one wheel, found {len(wheels)}")

          wheel = wheels[0]
          if "wasm32" not in wheel.name:
              raise SystemExit(f"Expected a Pyodide wasm32-emscripten wheel, got: {wheel.name}")

          with zipfile.ZipFile(wheel) as archive:
              if archive.testzip() is not None:
                  raise SystemExit("Downloaded wheel failed zip validation")
          PY

      - name: Check wheel exports for EM_JS symbols
        run: |
          wheel=$(ls dist/*.whl)
          echo "Absl-related exports:"
          pyodide auditwheel exports "$wheel" | grep absl || echo "(none)"
          if pyodide auditwheel exports "$wheel" | grep -q "HaveOffsetConverter"; then
            echo "ERROR: HaveOffsetConverter EM_JS symbol found — examine_stack linked into wasm side-module"
            exit 1
          fi
          echo "OK: no HaveOffsetConverter EM_JS symbol"
