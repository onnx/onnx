name: Pyodide Build

on:
  workflow_call:
    inputs:
      build_mode:
        required: false
        type: string
        default: "preview"
      protobuf_version:
        required: false
        type: string
        default: "33.6"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pyodide-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04

    env:
      PROTOBUF_VERSION: ${{ inputs.protobuf_version }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set preview version
        if: inputs.build_mode != 'release'
        shell: bash
        run: |
          sed -i'' 's/name = "onnx"/name = "onnx-weekly"/' pyproject.toml
          echo "$(cat VERSION_NUMBER).dev$(date -u +%Y%m%d)" > VERSION_NUMBER

      - name: Download protoc for host
        run: |
          curl -sSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOBUF_VERSION}/protoc-${PROTOBUF_VERSION}-linux-x86_64.zip" -o protoc.zip
          unzip -q protoc.zip -d protoc-host
          chmod +x protoc-host/bin/protoc

      - name: Download protobuf source
        run: |
          curl -sSL "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOBUF_VERSION}/protobuf-${PROTOBUF_VERSION}.tar.gz" -o protobuf.tar.gz
          tar -xf protobuf.tar.gz

      - name: Patch sbom.cdx.json with actual protobuf version and hash
        shell: bash
        run: python .github/scripts/patch_sbom.py

      - name: Set SOURCE_DATE_EPOCH for reproducible builds
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> $GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@54327ab9d35de03b359ac25c97de9417d94639c0  # v4.0.0rc1
        with:
          output-dir: dist/
        env:
          CIBW_PLATFORM: pyodide
          CIBW_TEST_COMMAND: >-
            python -c "from onnx import NodeProto; n = NodeProto(); n.op_type = 'Add'; print(n)"
          CIBW_ENVIRONMENT: >-
            CMAKE_ARGS="
            -DFETCHCONTENT_SOURCE_DIR_PROTOBUF=${{ github.workspace }}/protobuf-${{ env.PROTOBUF_VERSION }}
            -DONNX_CUSTOM_PROTOC_EXECUTABLE=${{ github.workspace }}/protoc-host/bin/protoc
            -DONNX_HARDENING=ON
            -DONNX_PYODIDE_BUILD=ON
            -DONNX_USE_LITE_PROTO=ON
            -DONNX_WERROR=ON
            -DCMAKE_CXX_FLAGS='-Wno-error=deprecated-builtins'
            "

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-pyodide
          path: dist/*.whl
