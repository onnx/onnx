name: Test source dist of preview build at onnx-weekly

on:
  schedule:
    - cron:  '0 0 * * 2'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  test_sdist_preview:

    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
        python-version: ['3.10', '3.12', '3.13']
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:

        - name: Checkout repository
          uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
          with:
            persist-credentials: false

        - name: Set up Python ${{ matrix.python-version }}
          uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
          with:
            python-version: ${{ matrix.python-version }}

        - name: Test preview build source distribution from PyPI
          run: |
            python -m pip install --no-binary onnx-weekly onnx-weekly
            python -m pip install pytest ml_dtypes pillow parameterized
            pytest
