name: Test source dist of preview build at onnx-weekly

on:
  schedule:
    - cron:  '0 0 * * 2'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  test_sdist_preview:

    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
        python-version: ['3.10', '3.12', '3.13']
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:

        - name: Checkout repository
          uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
          with:
            persist-credentials: false

        - name: Set up Python ${{ matrix.python-version }}
          uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
          with:
            python-version: ${{ matrix.python-version }}

        - name: Test preview build source distribution from PyPI
          run: |
            python -m pip install --no-binary onnx-weekly onnx-weekly
            python -m pip install pytest ml_dtypes pillow parameterized
            pytest
